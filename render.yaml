services:
  # --- FEATURE BILLING ENVIRONMENT ---
  - type: web
    name: billing-server-feature
    runtime: node
    branch: feature/billing
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: development
      - key: JWT_SECRET
        sync: false

  - type: web
    name: billing-client-feature
    runtime: static
    branch: feature/billing
    rootDir: mobile-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://billing-server-feature.onrender.com/api
