services:
  # --- FEATURE BILLING ENVIRONMENT ---
  - type: web
    name: billing-server-feature
    runtime: node
    branch: feature/billing
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: development
      - key: JWT_SECRET
        sync: false
